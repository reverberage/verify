name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

concurrency:
  group: wiki-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: reverberage/.github/actions/sync-wiki@main
        with:
          token: ${{ github.token }}
          path: docs
